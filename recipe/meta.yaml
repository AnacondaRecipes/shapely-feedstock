{% set name = "shapely" %}
{% set version = "2.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: adbd4060635098d5109e04668edcc015117a133c39da2899cc3ce9b665b76439

build:
  number: 0
  skip: true  # [py<310]
  script:
    - set GEOS_INCLUDE_PATH=%LIBRARY_INC%  # [win]
    - set GEOS_LIBRARY_PATH=%LIBRARY_LIB%  # [win]
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - cython
    - numpy >=1.25,<3
    - geos {{ geos }}
    - pip
    - setuptools >=61.0.0
    - wheel
    - tomli
  run:
    - python
    - numpy >=1.21

{% set skip_tests = "" %}
# Skip broken test on Windows UnicodeDecodeError
{% set skip_tests = skip_tests + " --deselect=tests/legacy/test_wkb.py::test_dump_binary_load_hex" %}  # [win]

test:
  requires:
    - pip
    - pytest
  imports:
    - shapely
    - shapely.algorithms
    - shapely.geometry
    - shapely.vectorized
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    # osx fails if LC_ALL is not Italian or Portuguese
    # see https://github.com/shapely/shapely/blob/2.0.5/shapely/tests/legacy/test_locale.py#L14
    - export LC_ALL=it_IT.UTF-8  # [osx]
    - pytest --pyargs {{ skip_tests }} shapely -v

about:
  home: https://github.com/shapely/shapely
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Python package for manipulation and analysis of geometric objects in the Cartesian plane
  description: Shapely is a BSD-licensed Python package for manipulation and analysis of planar geometric objects.
  dev_url: https://github.com/shapely/shapely
  doc_url: https://shapely.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
    - pelson
    - phobson
    - xylar
    - msarahan
